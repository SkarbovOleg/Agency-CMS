<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency CMS - Админ панель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; color: #333; }
        .nav-buttons { display: flex; gap: 15px; margin-bottom: 30px; }
        .nav-btn {
            background: #95a5a6; color: white; padding: 10px 20px;
            border-radius: 8px; text-decoration: none;
        }
        .card {
            background: white; border-radius: 12px; padding: 24px;
            margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 { margin-bottom: 20px; color: #555; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        input, textarea, select, button {
            padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
        }
        button { background: #3498db; color: white; border: none; cursor: pointer; }
        .team-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 20px;
        }
        .team-card {
            background: #f9f9f9; border-radius: 8px; padding: 15px; position: relative;
        }
        .team-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .delete-btn {
            position: absolute; top: 10px; right: 10px;
            background: #e74c3c; color: white; border: none;
            border-radius: 4px; padding: 5px 10px; cursor: pointer;
        }
        .link-item {
            background: #f9f9f9; padding: 15px; margin-bottom: 10px;
            border-radius: 8px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        .color-inputs { display: flex; gap: 20px; flex-wrap: wrap; }
        input[type="color"] { width: 60px; height: 40px; cursor: pointer; }
        .success-msg { background: #2ecc71; color: white; padding: 10px; border-radius: 6px; margin-top: 10px; display: none; }
        .avatar-preview { max-width: 100px; max-height: 100px; margin-top: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn">🏠 Портал</a>
            <a href="demo.html" class="nav-btn">🎨 Демо сайта</a>
        </div>
        
        <h1>📋 Админ-панель CMS</h1>
        
        <!-- Добавление сотрудника -->
        <div class="card">
            <h2>➕ Добавить сотрудника</h2>
            <form id="memberForm">
                <input type="text" id="full_name" placeholder="ФИО" required>
                <input type="text" id="position" placeholder="Должность" required>
                <textarea id="bio" placeholder="Описание сотрудника"></textarea>
                <input type="url" id="avatar_url" placeholder="URL аватара (ссылка на картинку)">
                <div id="avatarPreview"></div>
                <button type="submit">Добавить сотрудника</button>
            </form>
        </div>
        
        <!-- Список команды -->
        <div class="card">
            <h2>👥 Команда (<span id="teamCount">0</span>)</h2>
            <div id="teamList" class="team-grid"></div>
        </div>
        
        <!-- Цветовая тема -->
        <div class="card">
            <h2>🎨 Цветовая тема</h2>
            <form id="themeForm">
                <div class="color-inputs">
                    <label>Основной цвет: <input type="color" id="primary_color"></label>
                    <label>Вторичный цвет: <input type="color" id="secondary_color"></label>
                    <label>Цвет фона: <input type="color" id="background_color"></label>
                </div>
                <button type="submit">Обновить тему</button>
            </form>
            <div id="themeSuccess" class="success-msg">✅ Тема обновлена!</div>
        </div>
        
        <!-- Управление ссылками -->
        <div class="card">
            <h2>🔗 Внешние ссылки</h2>
            <form id="linkForm">
                <input type="text" id="link_name" placeholder="Название" required>
                <input type="url" id="link_url" placeholder="https://..." required>
                <select id="link_type">
                    <option value="href">Обычная ссылка</option>
                    <option value="button">Кнопка</option>
                </select>
                <button type="submit">Добавить ссылку</button>
            </form>
            <div id="linksList" class="links-list"></div>
        </div>
    </div>
    
    <script>
        const API = '/api';
        
        // ============ Работа с сервером ============
        async function loadTeam() {
            const res = await fetch(`${API}/team`);
            const team = await res.json();
            document.getElementById('teamCount').textContent = team.length;
            const container = document.getElementById('teamList');
            if (team.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999;">Нет сотрудников</p>';
                return;
            }
            container.innerHTML = team.map(m => `
                <div class="team-card">
                    <button class="delete-btn" onclick="deleteMember('${m.id}')">✖</button>
                    ${m.avatar_url ? `<img src="${m.avatar_url}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23ddd%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22%3E📷%3C/text%3E%3C/svg%3E'">` : '<div style="height:180px; background:#ddd; display:flex; align-items:center; justify-content:center;">📷</div>'}
                    <h3>${escapeHtml(m.full_name)}</h3>
                    <div class="position">${escapeHtml(m.position)}</div>
                    <div class="bio">${escapeHtml(m.bio || '')}</div>
                </div>
            `).join('');
        }
        
        async function deleteMember(id) {
            if (confirm('Удалить сотрудника?')) {
                await fetch(`${API}/team/${id}`, { method: 'DELETE' });
                loadTeam();
                loadDemoData();
            }
        }
        
        async function loadTheme() {
            const res = await fetch(`${API}/theme`);
            const theme = await res.json();
            document.getElementById('primary_color').value = theme.primary_color;
            document.getElementById('secondary_color').value = theme.secondary_color;
            document.getElementById('background_color').value = theme.background_color;
        }
        
        async function loadLinks() {
            const res = await fetch(`${API}/links`);
            const links = await res.json();
            const container = document.getElementById('linksList');
            if (links.length === 0) {
                container.innerHTML = '<p>Нет ссылок</p>';
                return;
            }
            container.innerHTML = links.map(l => `
                <div class="link-item">
                    <strong>${escapeHtml(l.name)}</strong>
                    <span>${escapeHtml(l.url)}</span>
                    <span>${l.type === 'button' ? 'Кнопка' : 'Ссылка'}</span>
                    <button onclick="deleteLink('${l.id}')">Удалить</button>
                </div>
            `).join('');
        }
        
        async function deleteLink(id) {
            if (confirm('Удалить ссылку?')) {
                await fetch(`${API}/links/${id}`, { method: 'DELETE' });
                loadLinks();
                loadDemoData();
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        // Предпросмотр аватара
        document.getElementById('avatar_url').addEventListener('input', function() {
            const preview = document.getElementById('avatarPreview');
            preview.innerHTML = this.value ? `<img src="${this.value}" class="avatar-preview" onerror="this.style.display='none'">` : '';
        });
        
        // Добавление сотрудника
        document.getElementById('memberForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch(`${API}/team`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    full_name: document.getElementById('full_name').value,
                    position: document.getElementById('position').value,
                    bio: document.getElementById('bio').value,
                    avatar_url: document.getElementById('avatar_url').value || null
                })
            });
            e.target.reset();
            document.getElementById('avatarPreview').innerHTML = '';
            loadTeam();
            loadDemoData();
        });
        
        // Обновление темы
        document.getElementById('themeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch(`${API}/theme`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    primary_color: document.getElementById('primary_color').value,
                    secondary_color: document.getElementById('secondary_color').value,
                    background_color: document.getElementById('background_color').value
                })
            });
            const msg = document.getElementById('themeSuccess');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 2000);
            loadDemoData();
        });
        
        // Добавление ссылки
        document.getElementById('linkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch(`${API}/links`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('link_name').value,
                    url: document.getElementById('link_url').value,
                    type: document.getElementById('link_type').value
                })
            });
            e.target.reset();
            loadLinks();
            loadDemoData();
        });
        
        // Обновляем демо-сайт (для синхронизации)
        async function loadDemoData() {
            const team = await (await fetch(`${API}/team`)).json();
            const theme = await (await fetch(`${API}/theme`)).json();
            const links = await (await fetch(`${API}/links`)).json();
            localStorage.setItem('cms_sync', JSON.stringify({ team, theme, links, time: Date.now() }));
        }
        
        // Загрузка
        loadTeam();
        loadTheme();
        loadLinks();
    </script>
</body>
</html>
